<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Stream Bot</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f0f; color: white; overflow-x: hidden; }
        
        /* Header */
        .header { padding: 15px; text-align: center; background: #1a1a1a; border-bottom: 2px solid #0088cc; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; color: #0088cc; }

        /* Video Player Container */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        video { width: 100%; height: 100%; outline: none; }

        /* Channel List */
        .channel-list { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .channel-card { 
            background: #252525; padding: 15px; border-radius: 10px; text-align: center; 
            cursor: pointer; transition: 0.3s; border: 1px solid #333;
        }
        .channel-card:hover { background: #0088cc; transform: translateY(-3px); }
        .channel-card i { display: block; margin-bottom: 5px; font-size: 20px; }
        
        /* Loading Spinner */
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }

        /* Custom UI for Mobile */
        @media (max-width: 480px) {
            .channel-list { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>LIVE STREAMING PLAYER</h1>
</div>

<div class="video-container">
    <div id="loading">Loading...</div>
    <video id="video" controls autoplay playsinline></video>
</div>

<div class="channel-list" id="channelList">
    <!-- চ্যানেলগুলো এখানে যুক্ত হবে -->
</div>

<script>
    // আপনার স্ট্রিম নেটওয়ার্ক লিঙ্কগুলো এখানে দিন
    const channels = [
        { name: "IRIB 4K Football", url: "https://example.com/irib4k/index.m3u8" }, // আপনার IRIB 4K লিঙ্ক দিন
        { name: "IPTV BD Online", url: "http://iptvbd.online/stream/link.m3u8" },
        { name: "Live Sports 1", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8" },
        { name: "Global News", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
    ];

    const video = document.getElementById('video');
    const channelListDiv = document.getElementById('channelList');

    // চ্যানেল লিস্ট তৈরি করার ফাংশন
    function loadChannels() {
        channels.forEach((channel, index) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<div>${channel.name}</div>`;
            card.onclick = () => playStream(channel.url);
            channelListDiv.appendChild(card);
        });
    }

    // ভিডিও প্লে করার ফাংশন (HLS support সহ)
    function playStream(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    }

    // ডিফল্টভাবে প্রথম চ্যানেলটি চালু হবে
    window.onload = () => {
        loadChannels();
        playStream(channels[0].url);
    };
</script>

</body>
</html>
