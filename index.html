<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPlay AI - Telegram Live TV</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js for M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        .tab-active { border-color: #10b981; color: #10b981; background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans select-none">

    <!-- Header -->
    <header class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center border border-emerald-500/30">
                    <i class="fa-solid fa-microchip text-emerald-400 animate-pulse"></i>
                </div>
                <div>
                    <span class="font-bold text-base tracking-wider bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent block">STREAMPLAY AI</span>
                    <span class="text-[9px] text-slate-400 -mt-1 block">Auto-Sync Premium IPTV Engine</span>
                </div>
            </div>
            <!-- Sync Button -->
            <button onclick="syncAllPlaylists()" class="flex items-center space-x-1.5 text-xs bg-slate-800 hover:bg-slate-700 text-emerald-400 px-3 py-1.5 rounded-xl border border-slate-700/60 transition active:scale-95">
                <i id="sync-icon" class="fa-solid fa-rotate"></i>
                <span>Auto Sync</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-3 space-y-4">

        <!-- Video Player Window -->
        <div class="bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-800/80 aspect-video relative group">
            <video id="video-player" class="w-full h-full object-contain" controls autoplay playsinline></video>
            <!-- Overlay Loader -->
            <div id="player-loader" class="absolute inset-0 bg-slate-950/90 flex flex-col justify-center items-center hidden transition-all">
                <div class="relative flex items-center justify-center">
                    <div class="animate-ping absolute inline-flex h-12 w-12 rounded-full bg-emerald-400 opacity-20"></div>
                    <i class="fa-solid fa-network-wired text-3xl text-emerald-400 animate-bounce"></i>
                </div>
                <span id="loader-status" class="text-xs text-slate-300 mt-3 font-mono">Connecting Live Server...</span>
            </div>
        </div>

        <!-- Now Playing Status & AI Info -->
        <div id="status-card" class="bg-slate-900/60 border border-slate-800/60 rounded-xl p-3.5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 hidden">
            <div class="flex items-center space-x-3 overflow-hidden">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </span>
                <div class="truncate">
                    <p class="text-xs text-slate-400 font-mono">ACTIVE CHANNEL</p>
                    <p id="active-channel-name" class="text-sm font-semibold text-emerald-400 truncate">Select a channel to play</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <span id="latency-tag" class="text-[10px] bg-slate-800 text-slate-300 px-2.5 py-1 rounded-md border border-slate-700/50 font-mono">Active Proxy 1</span>
                <button onclick="tryAlternativeServer()" class="text-[10px] bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 px-2.5 py-1 rounded-md border border-amber-500/20 transition">
                    <i class="fa-solid fa-shuffle mr-1"></i> Switch Server
                </button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-slate-800 text-xs font-semibold overflow-x-auto whitespace-nowrap scrollbar-none">
            <button onclick="switchTab('sports')" id="tab-sports" class="tab-active py-2.5 px-4 border-b-2 border-transparent transition-all duration-200">
                <i class="fa-solid fa-trophy mr-1.5"></i> Sports Live
            </button>
            <button onclick="switchTab('bd-tv')" id="tab-bd-tv" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all duration-200">
                <i class="fa-solid fa-tv mr-1.5"></i> BD Live TV
            </button>
            <button onclick="switchTab('global')" id="tab-global" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all duration-200">
                <i class="fa-solid fa-globe mr-1.5"></i> Global Sports
            </button>
            <button onclick="switchTab('custom')" id="tab-custom" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all duration-200">
                <i class="fa-solid fa-bookmark mr-1.5"></i> Saved
            </button>
        </div>

        <!-- Custom Input Panel (Only shown in Custom tab or toggleable) -->
        <section id="custom-panel" class="bg-slate-900/40 rounded-xl p-4 border border-slate-800/80 hidden">
            <h3 class="text-xs font-semibold text-slate-300 mb-2">Add Your Own Private Stream Link</h3>
            <div class="space-y-2">
                <input type="text" id="cust-title" placeholder="Channel Title (e.g., Star Sports)" class="w-full bg-slate-950 border border-slate-800/80 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500">
                <div class="flex gap-2">
                    <input type="text" id="cust-url" placeholder="M3U8 link here..." class="flex-grow bg-slate-950 border border-slate-800/80 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500">
                    <button onclick="savePrivateChannel()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-4 py-2 rounded-lg text-xs transition">Save</button>
                </div>
            </div>
        </section>

        <!-- Dynamic Grid List of Channels -->
        <section class="min-h-[250px]">
            <div id="channels-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                <!-- Javascript will load content here dynamically -->
            </div>
            <!-- Empty state loader inside Grid -->
            <div id="grid-loader" class="flex flex-col items-center justify-center py-16 hidden">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500"></div>
                <p class="text-xs text-slate-500 mt-2">Updating dynamic cloud streams...</p>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-700 text-center py-4 text-[10px] border-t border-slate-900">
        <p>Powered by StreamPlay AI Engine • Auto-Rebuilding IPTV Protocols</p>
    </footer>

    <script>
        // Telegram WebApp Setup
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const video = document.getElementById('video-player');
        const loader = document.getElementById('player-loader');
        const statusCard = document.getElementById('status-card');
        const activeName = document.getElementById('active-channel-name');
        const latencyTag = document.getElementById('latency-tag');
        const gridLoader = document.getElementById('grid-loader');

        let currentTab = 'sports';
        let hlsInstance = null;
        let currentStreamUrl = '';
        let currentStreamTitle = '';
        let fallbackUrls = []; // Alternative streams array for failover
        let fallbackIndex = 0;

        // Auto-Updating Playlists from active cloud servers
        const CLOUD_SOURCES = {
            sports: 'https://raw.githubusercontent.com/sm-monirulislam/SM-Live-TV/refs/heads/main/Combined_Live_TV.m3u', // Live Sports matches
            bdtv: 'https://raw.githubusercontent.com/imShakil/tvlink/refs/heads/main/iptv.m3u8', // BD Channels
            jagobd: 'https://raw.githubusercontent.com/tahsinulmohsin/jagobd-m3u8-scraper/master/playlist.m3u8', // JagoBD scraper
            global: 'https://iptv-org.github.io/iptv/categories/sports.m3u' // Global Sports
        };

        // Cache for Parsed Channels
        let db = {
            sports: [],
            bdtv: [],
            global: [],
            custom: []
        };

        // Free CORS Proxies to bypass geoblocks and CORS issues
        const PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${url}`
        ];
        let activeProxyIndex = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            loadSavedPrivateChannels();
            await syncAllPlaylists();
        });

        // Switch panel tabs
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');

            const custPanel = document.getElementById('custom-panel');
            if (tab === 'custom') {
                custPanel.classList.remove('hidden');
            } else {
                custPanel.classList.add('hidden');
            }
            renderChannels();
        }

        // Fetch & parse lists automatically with Proxy Rotation
        async function fetchWithProxy(targetUrl) {
            let lastError;
            for (let i = 0; i < PROXIES.length; i++) {
                try {
                    const proxyUrl = PROXIES[i](targetUrl);
                    const response = await fetch(proxyUrl);
                    if (response.ok) {
                        activeProxyIndex = i;
                        return await response.text();
                    }
                } catch (e) {
                    lastError = e;
                    console.warn(`Proxy ${i} failed. Trying next proxy...`);
                }
            }
            throw lastError || new Error("All proxies failed to fetch");
        }

        // Parse M3U playlist file dynamically
        function parseM3uData(text) {
            const lines = text.split('\n');
            let list = [];
            let current = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    current = {};
                    // Extract Logo
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    current.logo = logoMatch ? logoMatch[1] : '';
                    
                    // Extract Title
                    const commaIdx = line.lastIndexOf(',');
                    current.title = commaIdx !== -1 ? line.substring(commaIdx + 1).trim() : 'Unknown Channel';
                } else if (line.startsWith('http') && current) {
                    current.url = line;
                    list.push(current);
                    current = null;
                }
            }
            return list;
        }

        // Sync and Load lists from Web Servers
        async function syncAllPlaylists() {
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('animate-spin');
            gridLoader.classList.remove('hidden');
            document.getElementById('channels-grid').innerHTML = '';

            try {
                // Fetch Sports Matches
                const sportsText = await fetchWithProxy(CLOUD_SOURCES.sports);
                db.sports = parseM3uData(sportsText);

                // Fetch BD TV Channels (Combines tvlink & jagobd-scraper)
                const bdText = await fetchWithProxy(CLOUD_SOURCES.bdtv);
                const bdList = parseM3uData(bdText);
                
                try {
                    const jagoText = await fetchWithProxy(CLOUD_SOURCES.jagobd);
                    const jagoList = parseM3uData(jagoText);
                    db.bdtv = [...jagoList, ...bdList];
                } catch(err) {
                    db.bdtv = bdList; // Fallback only to TVLink if jagobd fails
                }

                // Fetch Global Sports
                const globalText = await fetchWithProxy(CLOUD_SOURCES.global);
                db.global = parseM3uData(globalText).slice(0, 100); // Limit to top 100 to avoid lag

                console.log("Successfully Auto-Synced all lists!");
            } catch (err) {
                console.error("Auto Sync Error: ", err);
                // Load local fallback streams
                db.sports = [
                    { title: "T Sports Live HD (S1)", url: "https://stream.sunplex.live/T-SPORTS/index.m3u8", logo: "" },
                    { title: "T Sports Live (S2)", url: "https://tvsen7.aynaott.com/tsportsfhd/index.m3u8", logo: "" }
                ];
                db.bdtv = [
                    { title: "Gazi TV Live HD", url: "https://stream.sunplex.live/GAZI-TV/index.m3u8", logo: "" },
                    { title: "BTV World", url: "http://38.96.178.201:80/live/BTV/index.m3u8", logo: "" }
                ];
            } finally {
                syncIcon.classList.remove('animate-spin');
                gridLoader.classList.add('hidden');
                renderChannels();
            }
        }

        // Render UI Grid based on current active tab
        function renderChannels() {
            const container = document.getElementById('channels-grid');
            container.innerHTML = '';
            
            let list = [];
            if (currentTab === 'sports') list = db.sports;
            else if (currentTab === 'bd-tv') list = db.bdtv;
            else if (currentTab === 'global') list = db.global;
            else if (currentTab === 'custom') list = db.custom;

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-16 text-center text-slate-500 text-xs font-mono">
                        <i class="fa-solid fa-circle-nodes text-2xl mb-2 text-slate-600 block"></i>
                        No live channels found in this tab. Try syncing again.
                    </div>
                `;
                return;
            }

            list.forEach((ch, idx) => {
                const item = document.createElement('div');
                item.className = 'bg-slate-900/60 border border-slate-800/80 rounded-xl p-3.5 flex items-center justify-between hover:border-emerald-500/30 hover:bg-slate-900 transition duration-200 group cursor-pointer';
                
                // Use default icons if logo is empty
                const channelLogo = ch.logo ? `<img src="${ch.logo}" class="w-10 h-10 object-contain rounded-lg bg-slate-950 p-1" onerror="this.src='https://placehold.co/40x40/0f172a/10b981?text=TV'">` : 
                `<div class="w-10 h-10 bg-slate-950 rounded-lg flex items-center justify-center text-emerald-400 group-hover:bg-emerald-500 group-hover:text-slate-950 transition-all duration-300">
                    <i class="fa-solid fa-play text-xs"></i>
                </div>`;

                item.innerHTML = `
                    <div class="flex items-center space-x-3 overflow-hidden flex-grow" onclick="initializeStreamPlay('${ch.url}', '${ch.title}')">
                        ${channelLogo}
                        <div class="truncate">
                            <h4 class="text-xs font-bold text-slate-200 truncate group-hover:text-emerald-400 transition">${ch.title}</h4>
                            <p class="text-[10px] text-slate-500 truncate mt-0.5">${ch.url}</p>
                        </div>
                    </div>
                    ${currentTab === 'custom' ? `
                    <button onclick="deletePrivateChannel('${ch.id}')" class="text-slate-600 hover:text-rose-400 p-2 transition">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                    ` : ''}
                `;
                container.appendChild(item);
            });
        }

        // Initialize and Play stream with Failover Protection (Auto Future Fallback)
        function initializeStreamPlay(url, title) {
            currentStreamUrl = url;
            currentStreamTitle = title;
            
            // Build fallback list based on same channel title pattern match
            fallbackUrls = [url];
            fallbackIndex = 0;
            
            // Add other matching streams as fallback servers
            const cleanTitle = title.toLowerCase().replace(/live|hd|server|\d+/g, '').trim();
            let allAvailable = [...db.sports, ...db.bdtv, ...db.global];
            allAvailable.forEach(ch => {
                if (ch.url !== url && ch.title.toLowerCase().includes(cleanTitle)) {
                    fallbackUrls.push(ch.url);
                }
            });

            playActiveM3u8();
        }

        // Actual HLS streaming driver
        function playActiveM3u8() {
            if (fallbackUrls.length === 0) return;
            const activeUrl = fallbackUrls[fallbackIndex];

            // Show Loader Status
            loader.classList.remove('hidden');
            statusCard.classList.remove('hidden');
            activeName.textContent = currentStreamTitle;
            latencyTag.textContent = `Server Node ${fallbackIndex + 1}/${fallbackUrls.length}`;

            // Reset player instance
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                hlsInstance.loadSource(activeUrl);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    loader.classList.add('hidden');
                    video.play().catch(e => console.log("User interaction needed: ", e));
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("HLS Network Error, attempting fallback...");
                                tryAlternativeServer();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
