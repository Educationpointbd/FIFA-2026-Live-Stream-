<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #0088cc; --bg: #0a0a0a; --card: #161616; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: white; }

        .header { padding: 15px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); font-size: 18px; font-weight: bold; }

        /* Player Area */
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe, video { width: 100%; height: 100%; border: none; }

        /* Channel List */
        .list-container { padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .channel-btn { 
            background: var(--card); padding: 12px; border-radius: 8px; text-align: center; 
            cursor: pointer; border: 1px solid #333; transition: 0.2s; font-size: 14px;
        }
        .channel-btn:active { transform: scale(0.95); background: var(--primary); }
        .active-chan { border-color: var(--primary); background: rgba(0, 136, 204, 0.2); }

        .status { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">LIVE STREAMING TV</div>

<div id="player-container">
    <!-- এখানে ভিডিও বা আইফ্রেম লোড হবে -->
    <div id="display-area" style="width:100%; height:100%; display: flex; align-items: center; justify-content: center; color: #555;">
        চ্যানেল সিলেক্ট করুন
    </div>
</div>

<div class="list-container">
    <div class="grid" id="channelGrid"></div>
    <p class="status">Powerd by Telegram Mini App</p>
</div>

<script>
    // আপনার চ্যানেলের সোর্স এখানে দিন
    // টাইপ 'iframe' দিলে সেটি সরাসরি ওয়েবসাইট থেকে দেখাবে (সবচেয়ে ভালো)
    // টাইপ 'hls' দিলে সেটি .m3u8 লিঙ্ক চালাবে
    const channels = [
        { 
            name: "IRIB 4K Live", 
            type: "iframe", 
            url: "https://www.telewebion.com/live/irib4k" // অফিসিয়াল এমবেড লিঙ্ক
        },
        { 
            name: "Sports Live (Web)", 
            type: "iframe", 
            url: "https://vaughn.live/embed/video/f1stream" // উদাহরণ ওয়েবসাইট লিঙ্ক
        },
        { 
            name: "Somoy TV Live", 
            type: "iframe", 
            url: "https://www.youtube.com/embed/live_stream?channel=UC8p9mU3-63m6D5Yv78Z_9pA&autoplay=1" 
        },
        { 
            name: "IPTV BD Server", 
            type: "hls", 
            url: "http://iptvbd.online/test.m3u8" 
        }
    ];

    const displayArea = document.getElementById('display-area');

    function play(index) {
        const chan = channels[index];
        const buttons = document.querySelectorAll('.channel-btn');
        buttons.forEach(b => b.classList.remove('active-chan'));
        buttons[index].classList.add('active-chan');

        if (chan.type === 'iframe') {
            displayArea.innerHTML = `<iframe src="${chan.url}" allowfullscreen allow="autoplay"></iframe>`;
        } 
        else if (chan.type === 'hls') {
            displayArea.innerHTML = `<video id="video" controls autoplay></video>`;
            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(chan.url);
                hls.attachMedia(video);
            } else {
                video.src = chan.url;
            }
        }
    }

    // গ্রিড তৈরি
    const grid = document.getElementById('channelGrid');
    channels.forEach((chan, i) => {
        const div = document.createElement('div');
        div.className = 'channel-btn';
        div.innerText = chan.name;
        div.onclick = () => play(i);
        grid.appendChild(div);
    });

    // প্রথম চ্যানেলটি অটো লোড হবে
    play(0);
</script>

</body>
</html>
