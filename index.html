<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPlay - Telegram Mini App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js CDN for M3U8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Custom scrollbar for better UI */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Header Section -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-circle-play text-emerald-500 text-2xl animate-pulse"></i>
                <span class="font-bold text-lg tracking-wider bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">STREAMPLAY</span>
            </div>
            <div class="text-xs bg-slate-800 text-slate-300 px-3 py-1 rounded-full border border-slate-700">
                <i class="fa-brands fa-telegram text-sky-400 mr-1"></i> Mini App
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 space-y-6">

        <!-- Video Player Window -->
        <div class="bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-800 aspect-video relative group">
            <video id="video-player" class="w-full h-full object-contain" controls autoplay playsinline></video>
            <!-- Overlay Loader -->
            <div id="player-loader" class="absolute inset-0 bg-slate-950/80 flex flex-col justify-center items-center hidden">
                <i class="fa-solid fa-spinner animate-spin text-4xl text-emerald-500 mb-2"></i>
                <span class="text-sm text-slate-400">Loading Stream...</span>
            </div>
        </div>

        <!-- Now Playing Alert -->
        <div id="now-playing-container" class="bg-slate-900/60 border border-slate-800 rounded-xl p-3 hidden items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></span>
                <p class="text-sm font-medium">Now Streaming: <span id="now-playing-title" class="text-emerald-400">Custom URL</span></p>
            </div>
            <button onclick="stopStream()" class="text-xs bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 px-2.5 py-1 rounded-md border border-rose-500/20 transition">
                Stop
            </button>
        </div>

        <!-- Input Box for Custom URL -->
        <section class="bg-slate-900 rounded-2xl p-5 border border-slate-800/80 shadow-lg">
            <h2 class="text-md font-semibold text-slate-300 mb-3 flex items-center">
                <i class="fa-solid fa-link text-emerald-400 mr-2"></i> Add Custom Stream Link
            </h2>
            <div class="space-y-3">
                <input type="text" id="custom-title-input" placeholder="Channel/Stream Title (e.g., Live Sports)" 
                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 transition placeholder:text-slate-600">
                
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="custom-url-input" placeholder="Paste your M3U8 or stream link here..." 
                        class="flex-grow bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 transition placeholder:text-slate-600">
                    
                    <button onclick="playCustomUrl()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-semibold px-6 py-3 rounded-xl transition flex items-center justify-center space-x-1 shadow-lg shadow-emerald-500/15">
                        <i class="fa-solid fa-play"></i>
                        <span>Play</span>
                    </button>
                    <button onclick="saveCustomChannel()" class="bg-slate-800 hover:bg-slate-700 text-slate-100 px-4 py-3 rounded-xl transition flex items-center justify-center border border-slate-700" title="Save Channel">
                        <i class="fa-solid fa-bookmark mr-1"></i> Save
                    </button>
                </div>
            </div>
        </section>

        <!-- Channels Grid / Pre-configured Sports & TV -->
        <section class="bg-slate-900 rounded-2xl p-5 border border-slate-800/80 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-md font-semibold text-slate-300 flex items-center">
                    <i class="fa-solid fa-tv text-emerald-400 mr-2"></i> Channel List & Playlist
                </h2>
                <span class="text-xs text-slate-500" id="channel-count">0 Channels</span>
            </div>

            <!-- Dynamic Grid -->
            <div id="channels-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- Dynamic items will be loaded here -->
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-600 text-center py-4 text-xs border-t border-slate-900">
        <p>© 2026 StreamPlay Mini App. Built for Telegram and GitHub Pages.</p>
    </footer>

    <script>
        // Initialize Telegram WebApp
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand(); // Make the mini app full screen inside Telegram
        }

        const video = document.getElementById('video-player');
        const loader = document.getElementById('player-loader');
        const nowPlayingContainer = document.getElementById('now-playing-container');
        const nowPlayingTitle = document.getElementById('now-playing-title');
        let hlsInstance = null;

        // Sample Pre-loaded Demo Channels (You can edit these to add default satellite channels or live feeds)
        const defaultChannels = [
            { id: '1', title: 'Live Sports Feed (Demo)', url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8' },
            { id: '2', title: 'Tears of Steel HLS', url: 'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8' }
        ];

        // Load channels on start
        document.addEventListener('DOMContentLoaded', () => {
            initChannels();
        });

        function getSavedChannels() {
            const saved = localStorage.getItem('stream_channels');
            return saved ? JSON.parse(saved) : defaultChannels;
        }

        function initChannels() {
            const channels = getSavedChannels();
            const container = document.getElementById('channels-container');
            const countLabel = document.getElementById('channel-count');
            
            container.innerHTML = '';
            countLabel.textContent = `${channels.length} Channels`;

            if (channels.length === 0) {
                container.innerHTML = `<div class="col-span-full py-8 text-center text-slate-500 text-sm">No channels added yet. Paste a link above to add!</div>`;
                return;
            }

            channels.forEach(channel => {
                const isDefault = defaultChannels.some(d => d.id === channel.id);
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3.5 bg-slate-950/60 rounded-xl border border-slate-800 hover:border-emerald-500/40 hover:bg-slate-950 transition group';
                
                item.innerHTML = `
                    <div class="flex items-center space-x-3 cursor-pointer overflow-hidden flex-grow" onclick="playStream('${channel.url}', '${channel.title}')">
                        <div class="w-10 h-10 bg-slate-900 rounded-lg flex items-center justify-center text-emerald-400 group-hover:text-slate-950 group-hover:bg-emerald-400 transition-all duration-300">
                            <i class="fa-solid fa-play text-sm"></i>
                        </div>
                        <div class="truncate">
                            <h3 class="font-medium text-sm text-slate-200 truncate group-hover:text-emerald-400 transition">${channel.title}</h3>
                            <p class="text-xs text-slate-600 truncate">${channel.url}</p>
                        </div>
                    </div>
                    ${!isDefault ? `
                    <button onclick="deleteChannel('${channel.id}')" class="text-slate-500 hover:text-rose-400 p-2 rounded-lg transition" title="Delete">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                    ` : ''}
                `;
                container.appendChild(item);
            });
        }

        // Play stream function
        function playStream(url, title) {
            if (!url) return;

            // Show Loader
            loader.classList.remove('hidden');
            nowPlayingContainer.classList.remove('hidden');
            nowPlayingTitle.textContent = title;

            // Clean up previous HLS instance
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    loader.classList.add('hidden');
                    video.play().catch(err => {
                        console.log("Auto-play blocked, waiting for user interaction: ", err);
                    });
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("Fatal network error encountered, trying to recover");
                                hlsInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("Fatal media error encountered, trying to recover");
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                console.error("Unrecoverable error encountered, destroying stream");
                                stopStream();
                                alert("Failed to play the stream. Please check if the link is active and supports CORS.");
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS for Safari (iOS / macOS)
                video.src = url;
                video.addEventListener('canplay', () => {
                    loader.classList.add('hidden');
                    video.play();
                });
            } else {
                loader.classList.add('hidden');
                alert("Your browser does not support M3U8 streaming.");
            }
        }

        // Play from custom input box
        function playCustomUrl() {
            const urlInput = document.getElementById('custom-url-input').value.trim();
            const titleInput = document.getElementById('custom-title-input').value.trim() || 'Custom Stream';
            if (urlInput) {
                playStream(urlInput, titleInput);
            } else {
                alert("Please enter a valid M3U8 or stream link.");
            }
        }

        // Stop Player
        function stopStream() {
            video.pause();
            video.src = "";
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            loader.classList.add('hidden');
            nowPlayingContainer.classList.add('hidden');
        }

        // Save channel to localstorage
        function saveCustomChannel() {
            const urlInput = document.getElementById('custom-url-input').value.trim();
            const titleInput = document.getElementById('custom-title-input').value.trim();

            if (!urlInput || !titleInput) {
                alert("Please fill up both Title and Stream URL fields.");
                return;
            }

            const saved = getSavedChannels();
            const newChannel = {
                id: Date.now().toString(),
                title: titleInput,
                url: urlInput
            };

            saved.push(newChannel);
            localStorage.setItem('stream_channels', JSON.stringify(saved));
            
            // Reset input values
            document.getElementById('custom-title-input').value = '';
            document.getElementById('custom-url-input').value = '';

            initChannels();
        }

        // Delete channel
        function deleteChannel(id) {
            let saved = getSavedChannels();
            saved = saved.filter(channel => channel.id !== id);
            localStorage.setItem('stream_channels', JSON.stringify(saved));
            initChannels();
        }
    </script>
</body>
			    </html>
