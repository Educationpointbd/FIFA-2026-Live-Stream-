<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsX Web - TMA Player Engine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Pro Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js Library for M3U8 Playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-emerald-500 selection:text-slate-950">

    <!-- Header Section -->
    <header class="bg-slate-900/95 border-b border-slate-800/80 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-500 flex items-center justify-center text-slate-950 shadow-lg shadow-emerald-500/20">
                    <i class="fa-solid fa-bolt text-lg"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-base tracking-wider bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">SPORTSX PRO</h1>
                    <span class="text-[9px] text-slate-400 font-mono block">All-Source Multi-Engine IPTV Player</span>
                </div>
            </div>
            
            <!-- Real-time Search Engine -->
            <div class="relative w-full sm:w-64">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fa-solid fa-magnifying-glass text-slate-500 text-xs"></i>
                </span>
                <input type="text" id="search-input" oninput="triggerSearch()" placeholder="চ্যানেল বা ম্যাচ খুঁজুন..." 
                    class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-9 pr-4 py-2 text-xs focus:outline-none focus:border-emerald-500 transition placeholder:text-slate-600 text-slate-200">
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow max-w-5xl w-full mx-auto p-3 space-y-4">

        <!-- Custom Advanced Video Player -->
        <div class="glass-card rounded-2xl overflow-hidden shadow-2xl relative aspect-video group">
            <video id="main-player" class="w-full h-full object-contain" controls autoplay playsinline></video>
            <!-- Custom Dynamic Loader -->
            <div id="player-spinner" class="absolute inset-0 bg-slate-950/95 flex flex-col justify-center items-center hidden">
                <div class="relative flex items-center justify-center mb-3">
                    <div class="animate-spin rounded-full h-10 w-10 border-2 border-emerald-500 border-t-transparent"></div>
                    <i class="fa-solid fa-play text-xs text-emerald-400 absolute"></i>
                </div>
                <span id="player-spinner-text" class="text-xs text-slate-400 font-mono">Resolving Streaming Node...</span>
            </div>
        </div>

        <!-- Dynamic Multi-Server / Source Switching Panel -->
        <div id="source-panel" class="bg-slate-900/40 border border-slate-800/60 rounded-xl p-3 flex flex-wrap items-center gap-2">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-1">
                <i class="fa-solid fa-server text-emerald-400 mr-1"></i> Multi Source:
            </span>
            <div id="servers-container" class="flex flex-wrap gap-2">
                <!-- Servers / Alternative Links Button will append here dynamically -->
                <span class="text-xs text-slate-600 font-mono">No active channel selected</span>
            </div>
        </div>

        <!-- M3U Playlist URL Importer (SportsX Future App Style) -->
        <section class="glass-card rounded-2xl p-4 space-y-3">
            <div class="flex justify-between items-center" onclick="toggleElement('importer-panel')">
                <h3 class="text-xs font-bold text-slate-300 flex items-center cursor-pointer">
                    <i class="fa-solid fa-cloud-arrow-down text-emerald-400 mr-2"></i> M3U Playlist Importer (IPTV Link)
                    <i class="fa-solid fa-caret-down ml-2 text-[10px] text-slate-500"></i>
                </h3>
                <span class="text-[10px] text-slate-500 font-mono">Auto Group Parsing Enabled</span>
            </div>
            
            <div id="importer-panel" class="space-y-2 hidden">
                <input type="text" id="m3u-title" placeholder="প্লেলিস্টের নাম দিন (e.g., My BD TV Playlist)" class="w-full bg-slate-950/90 border border-slate-800/80 rounded-xl px-3.5 py-2.5 text-xs focus:outline-none focus:border-emerald-500">
                <div class="flex gap-2">
                    <input type="text" id="m3u-url" placeholder="Paste .m3u or .m3u8 Playlist URL..." class="flex-grow bg-slate-950/90 border border-slate-800/80 rounded-xl px-3.5 py-2.5 text-xs focus:outline-none focus:border-emerald-500">
                    <button onclick="importOnlineM3UPlaylist()" class="btn-gradient text-slate-950 font-bold px-5 py-2.5 rounded-xl text-xs transition shadow-md shadow-emerald-500/10">Import List</button>
                </div>
            </div>
        </section>

        <!-- Dynamic Category Navigation Tabs -->
        <div class="flex border-b border-slate-800 text-xs font-semibold overflow-x-auto whitespace-nowrap scrollbar-none gap-1">
            <button onclick="switchTab('sports')" id="tab-sports" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 transition-all duration-200">
                <i class="fa-solid fa-trophy mr-1"></i> Live Matches
            </button>
            <button onclick="switchTab('bd-tv')" id="tab-bd-tv" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 transition-all duration-200">
                <i class="fa-solid fa-circle-play mr-1"></i> BD Channels
            </button>
            <button onclick="switchTab('premium')" id="tab-premium" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 transition-all duration-200">
                <i class="fa-solid fa-gem mr-1"></i> Indian Premium
            </button>
            <button onclick="switchTab('imported')" id="tab-imported" class="py-2.5 px-4 border-b-2 border-transparent text-slate-400 transition-all duration-200">
                <i class="fa-solid fa-folder-open mr-1"></i> Imported IPTV
            </button>
        </div>

        <!-- Active Channels Grid -->
        <section class="min-h-[300px] relative">
            <div id="channels-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <!-- Dynamically Rendered IPTV Cards -->
            </div>
            
            <!-- Global Grid Loading Progress Bar -->
            <div id="grid-loader" class="flex flex-col items-center justify-center py-20 hidden">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500"></div>
                <p class="text-xs text-slate-500 mt-2 font-mono">Crawling Multi-Source Repositories...</p>
            </div>
        </section>

    </main>

    <!-- App Bottom Footer -->
    <footer class="bg-slate-950 text-slate-700 text-center py-5 text-[10px] border-t border-slate-900 font-mono">
        <p>© 2026 SportsX TMA Web-Client • Built for Dynamic IPTV Broadcast Protocols</p>
    </footer>

    <script>
        // Telegram WebApp Setup
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const video = document.getElementById('main-player');
        const spinner = document.getElementById('player-spinner');
        const spinnerText = document.getElementById('player-spinner-text');
        const gridLoader = document.getElementById('grid-loader');

        let activeTab = 'sports';
        let searchQuery = '';
        let hlsInstance = null;
        
        // Multi-Source Playlist Repositories
        const DYNAMIC_SOURCES = {
            sports_scraped: 'https://raw.githubusercontent.com/sm-monirulislam/SM-Live-TV/refs/heads/main/Combined_Live_TV.m3u',
            bd_scraped: 'https://raw.githubusercontent.com/imShakil/tvlink/refs/heads/main/iptv.m3u8',
            premium_scraped: 'https://iptv-org.github.io/iptv/categories/sports.m3u'
        };

        // Channel Memory Array
        let masterChannelDb = {
            sports: [],
            bd_tv: [],
            premium: [],
            imported: []
        };

        // CORS Proxies
        const CORS_PROXIES = [
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://thingproxy.freeboard.io/fetch/${url}`
        ];
        let currentProxyIdx = 0;

        // Current Stream Info for Servers
        let activeStreamList = [];
        let activeStreamIdx = 0;
        let activeStreamTitle = '';

        document.addEventListener('DOMContentLoaded', async () => {
            loadImportedPlaylists();
            await syncMasterDatabases();
            switchTab('sports');
        });

        // Bypassing browser-CORS blockages
        async function fetchSourceContent(url) {
            let lastError;
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                try {
                    const proxyUrl = CORS_PROXIES[i](url);
                    const response = await fetch(proxyUrl);
                    if (response.ok) {
                        currentProxyIdx = i;
                        return await response.text();
                    }
                } catch (e) {
                    lastError = e;
                    console.warn(`Proxy Node ${i} Failed. Rotating...`);
                }
            }
            throw lastError || new Error("All proxy servers are offline");
        }

        // Custom M3U Parser logic supporting Channel Grouping, logos
        function parseM3uString(text) {
            const lines = text.split('\n');
            let channels = [];
            let current = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    current = {};
                    
                    // Logo Match
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    current.logo = logoMatch ? logoMatch[1] : '';

                    // Group Title Match
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    current.group = groupMatch ? groupMatch[1] : '';

                    // Channel Title
                    const lastComma = line.lastIndexOf(',');
                    current.title = lastComma !== -1 ? line.substring(lastComma + 1).trim() : 'Unnamed Channel';
                } else if (line.startsWith('http') && current) {
                    current.url = line;
                    channels.push(current);
                    current = null;
                }
            }
            return channels;
        }

        // Fetch & Cache dynamically to avoid API limits
        async function syncMasterDatabases() {
            gridLoader.classList.remove('hidden');
            try {
                // Fetch & parse BD TV Link
                const bdRaw = await fetchSourceContent(DYNAMIC_SOURCES.bd_scraped);
                masterChannelDb.bd_tv = parseM3uString(bdRaw);

                // Fetch & parse Sports Matches Link
                const sportsRaw = await fetchSourceContent(DYNAMIC_SOURCES.sports_scraped);
                masterChannelDb.sports = parseM3uString(sportsRaw);

                // Fetch & parse Premium Indian / Global Link
                const premiumRaw = await fetchSourceContent(DYNAMIC_SOURCES.premium_scraped);
                masterChannelDb.premium = parseM3uString(premiumRaw).slice(0, 150); // Fetch top 150

                console.log("Databases Sync Successful!");
            } catch (err) {
                console.error("Master Sync failed. Falling back to default servers...", err);
                // Fallback hardcoded servers if networks fail
                masterChannelDb.sports = [
                    { title: "T Sports Live (Source 1)", url: "https://stream.sunplex.live/T-SPORTS/index.m3u8", logo: "" },
                    { title: "T Sports HD (Source 2)", url: "https://tvsen7.aynaott.com/tsportsfhd/index.m3u8", logo: "" }
                ];
                masterChannelDb.bd_tv = [
                    { title: "Gazi TV Live HD", url: "https://stream.sunplex.live/GAZI-TV/index.m3u8", logo: "" },
                    { title: "BTV World Live", url: "http://38.96.178.201:80/live/BTV/index.m3u8", logo: "" }
                ];
            } finally {
                gridLoader.classList.add('hidden');
            }
        }

        // Render Tab views
        function switchTab(tabId) {
            activeTab = tabId;
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.classList.remove('text-emerald-400', 'border-emerald-400', 'border-b-2');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(`tab-${tabId}`);
            if (activeBtn) {
                activeBtn.classList.add('text-emerald-400', 'border-emerald-400', 'border-b-2');
                activeBtn.classList.remove('text-slate-400');
            }
            
            renderChannelsList();
        }

        // Live Search Handler
        function triggerSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            renderChannelsList();
        }

        // Render UI Cards on screen
        function renderChannelsList() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';

            let sourceList = [];
            if (activeTab === 'sports') sourceList = masterChannelDb.sports;
            else if (activeTab === 'bd-tv') sourceList = masterChannelDb.bd_tv;
            else if (activeTab === 'premium') sourceList = masterChannelDb.premium;
            else if (activeTab === 'imported') sourceList = masterChannelDb.imported;

            // Apply Search Filtering
            if (searchQuery) {
                sourceList = sourceList.filter(ch => ch.title.toLowerCase().includes(searchQuery));
            }

            if (sourceList.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center text-slate-600 text-xs font-mono">
                        <i class="fa-solid fa-binoculars text-2xl text-slate-700 mb-2 block"></i>
                        No channels matched your request.
                    </div>
                `;
                return;
            }

            sourceList.forEach((ch, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl p-3 flex items-center justify-between hover:border-emerald-500/30 hover:bg-slate-900/40 transition duration-300 group cursor-pointer';
                
                // Build Channel logo
                const logoHtml = ch.logo ? 
                    `<img src="${ch.logo}" class="w-10 h-10 object-contain rounded-lg bg-slate-950 p-1" onerror="this.src='https://placehold.co/40x40/0f172a/10b981?text=TV'">` :
                    `<div class="w-10 h-10 bg-slate-950 rounded-lg flex items-center justify-center text-emerald-400 group-hover:bg-emerald-500 group-hover:text-slate-950 transition duration-300">
                        <i class="fa-solid fa-play text-xs"></i>
                     </div>`;

                card.innerHTML = `
                    <div class="flex items-center space-x-3 overflow-hidden flex-grow" onclick="loadSourceEngine('${ch.url}', '${ch.title}')">
                        ${logoHtml}
                        <div class="truncate">
                            <h4 class="text-xs font-bold text-slate-200 group-hover:text-emerald-400 transition truncate">${ch.title}</h4>
                            <p class="text-[9px] text-slate-500 font-mono truncate mt-0.5">${ch.group || 'Active IPTV Node'}</p>
                        </div>
                    </div>
                    ${activeTab === 'imported' ? `
                    <button onclick="removeImportedChannel('${ch.id}')" class="text-slate-600 hover:text-rose-400 p-2 transition">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                    ` : ''}
                `;
                grid.appendChild(card);
            });
        }

        // Initialize streaming player with Advanced Failover
        function loadSourceEngine(url, title) {
            activeStreamTitle = title;
            activeStreamList = [url];
            activeStreamIdx = 0;

            // SportsX Feature: Dynamically fetch identical streams for auto server backup
            const cleanTitle = title.toLowerCase().replace(/live|hd|server|src|\d+/g, '').trim();
            const pool = [...masterChannelDb.sports, ...masterChannelDb.bd_tv, ...masterChannelDb.premium];
            pool.forEach(ch => {
                if (ch.url !== url && ch.title.toLowerCase().includes(cleanTitle)) {
                    activeStreamList.push(ch.url);
                }
            });

            renderServerButtons();
            playSelectedSource();
        }

        // Render Server Buttons underneath Video Player (Multi-source Panel)
        function renderServerButtons() {
            const container = document.getElementById('servers-container');
            container.innerHTML = '';

            activeStreamList.forEach((src, idx) => {
                const btn = document.createElement('button');
                btn.className = `text-[10px] px-3 py-1.5 rounded-lg border font-bold transition duration-200 ${
                    idx === activeStreamIdx ? 
                    'bg-emerald-500 text-slate-950 border-emerald-500 shadow-md shadow-emerald-500/15' : 
                    'bg-slate-950/80 text-slate-300 border-slate-800 hover:border-slate-700'
                }`;
                btn.innerHTML = `<i class="fa-solid fa-play text-[8px] mr-1"></i> Server ${idx + 1}`;
                btn.onclick = () => {
                    activeStreamIdx = idx;
                    renderServerButtons();
                    playSelectedSource();
                };
                container.appendChild(btn);
            });
        }

        // Play Selected Video Node
        function playSelectedSource() {
            if (activeStreamList.length === 0) return;
            const liveUrl = activeStreamList[activeStreamIdx];

            // Trigger Loader Spinner
            spinner.classList.remove('hidden');
            spinnerText.textContent = `Resolving Node: Server ${activeStreamIdx + 1}...`;

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxBufferLength: 45,
                    enableWorker: true
                });
                hlsInstance.loadSource(liveUrl);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    spinner.classList.add('hidden');
                    video.play().catch(err => console.log("Direct autoplay blocked, waiting interaction: ", err));
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.warn("Primary channel failed, initiating AI auto failover...");
                                triggerAutoFailover();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                triggerAutoFailover();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Apple Safari
                video.src = liveUrl;
                video.addEventListener('canplay', () => {
                    spinner.classList.add('hidden');
                    video.play();
                });
                video.addEventListener('error', () => {
                    triggerAutoFailover();
                });
            }
        }

        // Trigger Auto Failover Switch (Auto switches Server if crashes)
        function triggerAutoFailover() {
            if (activeStreamList.length > 1) {
                activeStreamIdx = (activeStreamIdx + 1) % activeStreamList.length;
                console.log(`Fallback triggered. Switching to Server Node ${activeStreamIdx + 1}`);
                renderServerButtons();
                playSelectedSource();
            } else {
                // Rotate proxy and reload
                currentProxyIdx = (currentProxyIdx + 1) % CORS_PROXIES.length;
                console.log(`No back-up links found. Rotating proxy engine and retrying...`);
                activeStreamList[0] = CORS_PROXIES[currentProxyIdx](activeStreamList[0]);
                playSelectedSource();
            }
        }

        // Custom M3U Importer System (SportsX TV Style)
        async function importOnlineM3UPlaylist() {
            const nameInp = document.getElementById('m3u-title');
            const urlInp = document.getElementById('m3u-url');

            const name = nameInp.value.trim();
            const url = urlInp.value.trim();

            if (!name || !url) {
                alert("প্লেলিস্টের নাম এবং সঠিক M3U লিংক দিন!");
                return;
            }

            try {
                gridLoader.classList.remove('hidden');
                const rawM3u = await fetchSourceContent(url);
                const parsedChannels = parseM3uString(rawM3u);

                if (parsedChannels.length === 0) {
                    alert("লিংকটি থেকে কোনো সচল টিভি চ্যানেল খুঁজে পাওয়া যায়নি!");
                    return;
                }

                // Add unique identifiers
                parsedChannels.forEach(ch => {
                    ch.id = 'imported-' + Math.random().toString(36).substr(2, 9);
                    ch.group = name;
                });

                masterChannelDb.imported = [...masterChannelDb.imported, ...parsedChannels];
                saveImportedPlaylists();

                nameInp.value = '';
                urlInp.value = '';
                toggleElement('importer-panel');
                switchTab('imported');

                alert(`সফলভাবে ${parsedChannels.length}টি চ্যানেল ইম্পোর্ট করা হয়েছে!`);
            } catch (err) {
                alert("প্লেলিস্ট ফাইলটি লোড করতে ব্যর্থ হয়েছে। লিংকটি সচল এবং CORS ফ্রী কিনা তা নিশ্চিত করুন।");
                console.error(err);
            } finally {
                gridLoader.classList.add('hidden');
            }
        }

        // Storage controllers
        function saveImportedPlaylists() {
            localStorage.setItem('sportsx_imported', JSON.stringify(masterChannelDb.imported));
        }

        function loadImportedPlaylists() {
            const saved = localStorage.getItem('sportsx_imported');
            masterChannelDb.imported = saved ? JSON.parse(saved) : [];
        }

        function removeImportedChannel(id) {
            masterChannelDb.imported = masterChannelDb.imported.filter(ch => ch.id !== id);
            saveImportedPlaylists();
            renderChannelsList();
        }

        // Helper UI toggler
        function toggleElement(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
